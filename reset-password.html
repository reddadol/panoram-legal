<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panoram — Nueva contraseña</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0A0A0F; color:#E8E8FF; font-family:-apple-system,BlinkMacSystemFont,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; }
  .card { background:#13131F; border:1px solid rgba(191,0,255,0.3); border-radius:20px; padding:32px 24px; max-width:380px; width:100%; }
  .logo { text-align:center; font-size:36px; margin-bottom:6px; color:#BF00FF; }
  h1 { text-align:center; font-size:18px; color:#BF00FF; letter-spacing:2px; margin-bottom:6px; font-family:monospace; }
  .subtitle { text-align:center; font-size:13px; color:#7070A0; margin-bottom:28px; }
  label { display:block; font-size:11px; color:#7070A0; letter-spacing:1px; margin-bottom:6px; font-family:monospace; }
  .input-wrap { position:relative; margin-bottom:14px; }
  input { width:100%; background:#0D0D1E; border:1px solid rgba(191,0,255,0.25); border-radius:12px; padding:13px 14px; color:#E8E8FF; font-size:15px; outline:none; transition:border-color 0.2s; }
  input:focus { border-color:#BF00FF; }
  .toggle-pw { position:absolute; right:14px; top:50%; transform:translateY(-50%); background:none; border:none; color:#7070A0; cursor:pointer; font-size:13px; }
  .strength { height:3px; border-radius:2px; margin-bottom:20px; transition:all 0.3s; }
  .btn { width:100%; padding:15px; border-radius:14px; border:none; font-family:monospace; font-size:13px; font-weight:700; letter-spacing:2px; cursor:pointer; background:linear-gradient(135deg,#BF00FF,#5500AA,#00F5FF); color:white; margin-top:4px; }
  .btn:disabled { opacity:0.5; cursor:not-allowed; }
  .error { background:rgba(255,32,121,0.1); border:1px solid rgba(255,32,121,0.3); border-radius:10px; padding:12px; font-size:13px; color:#FF2079; margin-bottom:16px; text-align:center; }
  .success { text-align:center; }
  .success .check { font-size:48px; margin-bottom:16px; }
  .success h2 { color:#00FF88; font-size:18px; margin-bottom:8px; }
  .success p { color:#7070A0; font-size:13px; line-height:1.6; }
  .hint { font-size:11px; color:#555580; margin-bottom:16px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">✦</div>
  <h1>PANORAM</h1>
  <p class="subtitle">Ingresa tu nueva contraseña</p>

  <div id="form-section">
    <label>NUEVA CONTRASEÑA</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Mínimo 8 caracteres" oninput="checkStrength()" />
      <button class="toggle-pw" onclick="togglePw('password')" type="button">👁</button>
    </div>
    <div class="strength" id="strength-bar"></div>

    <label>CONFIRMAR CONTRASEÑA</label>
    <div class="input-wrap">
      <input type="password" id="confirm" placeholder="Repite la contraseña" />
      <button class="toggle-pw" onclick="togglePw('confirm')" type="button">👁</button>
    </div>
    <p class="hint">Usa al menos 8 caracteres con letras y números</p>

    <div id="error-msg" class="error" style="display:none"></div>

    <button class="btn" id="submit-btn" onclick="resetPassword()">CAMBIAR CONTRASEÑA</button>
  </div>

  <div id="success-section" class="success" style="display:none">
    <div class="check">✅</div>
    <h2>¡Contraseña actualizada!</h2>
    <p>Tu contraseña fue cambiada correctamente.<br>Abre la app Panoram e ingresa con tu nueva contraseña.</p>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://fpjosrijcflbphbhufgw.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwam9zcmlqY2ZsYnBoYmh1ZmdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTM4Mjg4MDAsImV4cCI6MjAyOTQwNDgwMH0.Ej1_E7CZUQ4b4P1XVJaH3lHcFpFd8H8ZUgPl5bLpNlA'

const { createClient } = supabase
const client = createClient(SUPABASE_URL, SUPABASE_KEY)

// Inicializar sesión desde el hash de la URL (token de reset)
async function init() {
  const hash = window.location.hash
  if (hash) {
    const params = new URLSearchParams(hash.substring(1))
    const accessToken = params.get('access_token')
    const refreshToken = params.get('refresh_token')
    const type = params.get('type')

    if (type === 'recovery' && accessToken) {
      const { error } = await client.auth.setSession({
        access_token: accessToken,
        refresh_token: refreshToken || '',
      })
      if (error) {
        showError('El link expiró o es inválido. Solicita uno nuevo desde la app.')
        document.getElementById('submit-btn').disabled = true
      }
    } else if (params.get('error')) {
      showError(params.get('error_description') || 'Link inválido o expirado.')
      document.getElementById('submit-btn').disabled = true
    }
  }
}

function checkStrength() {
  const pw = document.getElementById('password').value
  const bar = document.getElementById('strength-bar')
  if (pw.length === 0) { bar.style.width = '0'; return }
  let score = 0
  if (pw.length >= 8) score++
  if (/[A-Z]/.test(pw)) score++
  if (/[0-9]/.test(pw)) score++
  if (/[^A-Za-z0-9]/.test(pw)) score++
  const colors = ['#FF2079','#FF7A00','#FFD600','#00FF88']
  const widths = ['25%','50%','75%','100%']
  bar.style.background = colors[score-1] || '#2A2A40'
  bar.style.width = score > 0 ? widths[score-1] : '0'
}

function togglePw(id) {
  const input = document.getElementById(id)
  input.type = input.type === 'password' ? 'text' : 'password'
}

function showError(msg) {
  const el = document.getElementById('error-msg')
  el.textContent = msg
  el.style.display = 'block'
}

async function resetPassword() {
  const password = document.getElementById('password').value
  const confirm = document.getElementById('confirm').value
  document.getElementById('error-msg').style.display = 'none'

  if (password.length < 8) return showError('La contraseña debe tener al menos 8 caracteres')
  if (password !== confirm) return showError('Las contraseñas no coinciden')

  const btn = document.getElementById('submit-btn')
  btn.disabled = true
  btn.textContent = 'CAMBIANDO...'

  const { error } = await client.auth.updateUser({ password })

  if (error) {
    showError(error.message || 'Error al cambiar contraseña. Intenta de nuevo.')
    btn.disabled = false
    btn.textContent = 'CAMBIAR CONTRASEÑA'
  } else {
    document.getElementById('form-section').style.display = 'none'
    document.getElementById('success-section').style.display = 'block'
  }
}

init()
</script>
</body>
</html>
