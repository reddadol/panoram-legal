<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panoram — Restablecer contraseña</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0A0A0F; color:#E8E8FF; font-family:-apple-system,sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; text-align:center; }
  .card { background:#13131F; border:1px solid rgba(191,0,255,0.3); border-radius:20px; padding:32px 24px; max-width:360px; width:100%; }
  .logo { font-size:32px; margin-bottom:8px; }
  h1 { font-size:20px; color:#BF00FF; letter-spacing:2px; margin-bottom:8px; }
  p { font-size:14px; color:#7070A0; line-height:1.6; margin-bottom:24px; }
  .step { background:rgba(191,0,255,0.08); border:1px solid rgba(191,0,255,0.2); border-radius:12px; padding:16px; margin-bottom:12px; font-size:13px; color:#B0B0D0; text-align:left; }
  .step strong { color:#E8E8FF; }
  .note { font-size:12px; color:#555580; margin-top:16px; }
  a { color:#00F5FF; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">✦</div>
  <h1>PANORAM</h1>
  <p>Tu link de recuperación fue validado correctamente.</p>

  <div class="step">
    <strong>1.</strong> Abre la app Panoram en tu dispositivo
  </div>
  <div class="step">
    <strong>2.</strong> Ve a <strong>Configuración → Cambiar contraseña</strong>
  </div>
  <div class="step">
    <strong>3.</strong> Ingresa tu nueva contraseña
  </div>

  <p class="note">
    Si tienes problemas escríbenos a<br>
    <a href="mailto:redd.adol@gmail.com">redd.adol@gmail.com</a>
  </p>
</div>
</body>
</html>
